  <!-- Google Maps Fix -->
  <script>
    setTimeout(() => {
      const cards = document.querySelectorAll("#location .rounded-2xl");
      if (!cards.length) return;

      const targetCard = cards[cards.length - 1];

      targetCard.innerHTML = `
        <iframe
          src="https://www.google.com/maps?q=Marktstraße+130+Hamburg&output=embed"
          width="100%"
          height="100%"
          style="border:0; width:100%; height:100%; min-height:400px; border-radius:16px;"
          loading="lazy"
          allowfullscreen>
        </iframe>
      `;
    }, 1500);
  </script>
